<!-- ============================================================
     SITE LOADER OVERLAY — radar/HUD style
     ============================================================ -->
<div id="site-loader" aria-hidden="true" aria-label="Loading portfolio">
  <p class="ldr-time" id="ldrTime">Local time: 00:00:00 (12:00 AM)</p>

  <div class="ldr-radar">
    <svg class="ldr-rings" viewBox="0 0 400 400" aria-hidden="true">
      <circle cx="200" cy="200" r="190" class="ldr-ring-track" />
      <circle
        cx="200"
        cy="200"
        r="190"
        class="ldr-ring-progress"
        id="ldrRingProgress"
        pathLength="100"
        stroke-dasharray="100"
        stroke-dashoffset="100"
      />
      <circle
        cx="200"
        cy="200"
        r="140"
        class="ldr-ring-track ldr-ring-track--mid"
      />
      <circle
        cx="200"
        cy="200"
        r="98"
        class="ldr-ring-track ldr-ring-track--inner"
      />
    </svg>

    <div class="ldr-labels">
      <span class="ldr-label" style="transform: rotate(0deg) translateY(-185px)">UI / UX</span>
      <span class="ldr-label" style="transform: rotate(36deg) translateY(-185px)">Animation</span>
      <span class="ldr-label" style="transform: rotate(72deg) translateY(-185px)">Prototype</span>
      <span class="ldr-label" style="transform: rotate(108deg) translateY(-185px)">Strategy</span>
      <span class="ldr-label" style="transform: rotate(144deg) translateY(-185px)">Branding</span>
      <span class="ldr-label" style="transform: rotate(180deg) translateY(-185px)">Back-End</span>
      <span class="ldr-label" style="transform: rotate(216deg) translateY(-185px)">Front-End</span>
      <span class="ldr-label" style="transform: rotate(252deg) translateY(-185px)">Testing</span>
      <span class="ldr-label" style="transform: rotate(288deg) translateY(-185px)">Research</span>
      <span class="ldr-label" style="transform: rotate(324deg) translateY(-185px)">Design</span>
    </div>

    <span class="ldr-tick ldr-tick--n"></span>
    <span class="ldr-tick ldr-tick--e"></span>
    <span class="ldr-tick ldr-tick--s"></span>
    <span class="ldr-tick ldr-tick--w"></span>
    <span class="ldr-tick ldr-tick--ne"></span>
    <span class="ldr-tick ldr-tick--nw"></span>
    <span class="ldr-tick ldr-tick--se"></span>
    <span class="ldr-tick ldr-tick--sw"></span>

    <div class="ldr-percent"><span id="ldrPercent">00</span></div>
  </div>

  <div class="ldr-corner ldr-corner--bl">
    <p class="ldr-since">
      since <span id="ldrYear">2023</span> <span class="ldr-cursor"></span>
    </p>
    <h2 class="ldr-title">Creative<br />UI/UX<br />Designer & Development</h2>
  </div>

  <div class="ldr-corner ldr-corner--br">
    <p>Creating<br />Memorable</p>
  </div>
</div>
