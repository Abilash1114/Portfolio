<!-- ============================================================
     SITE LOADER OVERLAY
     ============================================================ -->
<div id="site-loader" aria-hidden="true" aria-label="Loading portfolio">
  <div class="loader-logo">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="30" cy="30" r="28" stroke="url(#lg)" stroke-width="2" stroke-linecap="round" stroke-dasharray="176"
        stroke-dashoffset="176">
        <animate attributeName="stroke-dashoffset" from="176" to="0" dur="1.4s" fill="freeze" calcMode="spline"
          keySplines="0.4 0 0.2 1" />
      </circle>
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#0BDFBB" />
          <stop offset="100%" stop-color="#067965" />
        </linearGradient>
      </defs>
    </svg>
    <span class="loader-initials">AR</span>
  </div>
  <div class="loader-bar">
    <div class="loader-bar__fill"></div>
  </div>
  <p class="loader-label">Preparing my creative world…</p>
</div>
